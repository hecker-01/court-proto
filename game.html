<!doctype html>
<html lang="en" data-bs-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Game · King of the Court</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <div class="container py-4">
            <a
                href="index.html"
                class="text-secondary small d-inline-block mb-3"
            >
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <div id="content"></div>
        </div>

        <nav
            class="navbar fixed-bottom bg-body-tertiary border-top"
            id="bottom-nav"
        ></nav>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="js/data.js"></script>
        <script src="js/app.js"></script>
        <script>
            initNav("home");
            const user = getUser();
            const id = parseInt(qp("id"));

            function render() {
                const game = getGame(id);
                if (!game) {
                    show(
                        "content",
                        `
        <div class="text-center text-secondary py-5">
          <i class="bi bi-exclamation-circle" style="font-size:2rem"></i>
          <p class="mt-2">Game not found.</p>
          <a href="index.html" class="btn btn-outline-secondary btn-sm">Back to Home</a>
        </div>`,
                    );
                    return;
                }

                document.title = `${game.name} · King of the Court`;

                const inGame = user && isInGame(game, user.id);
                const spots = game.maxParticipants - game.participants.length;
                const canJoin =
                    user && game.status === "planned" && spots > 0 && !inGame;
                const canLeave = user && game.status === "planned" && inGame;
                const avgElo = game.participants.length
                    ? Math.round(
                          game.participants.reduce((s, p) => s + p.elo, 0) /
                              game.participants.length,
                      )
                    : null;

                const actionBtn = canJoin
                    ? `<button class="btn btn-primary btn-sm" onclick="handleJoin()">Sign Up</button>`
                    : canLeave
                      ? `<button class="btn btn-outline-danger btn-sm" onclick="handleLeave()">Leave Game</button>`
                      : inGame
                        ? `<span class="small text-primary"><i class="bi bi-check"></i> Signed up</span>`
                        : !user && game.status === "planned"
                          ? `<a href="login.html?next=${encodeURIComponent(location.href)}" class="btn btn-primary btn-sm">Sign in to join</a>`
                          : "";

                const sorted = [...game.participants].sort(
                    (a, b) => b.elo - a.elo,
                );

                show(
                    "content",
                    `
      <div class="card mb-3">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-start mb-2">
            <h2 class="h4 mb-0">${game.name}</h2>
            ${statusBadge(game.status)}
          </div>
          ${game.description ? `<p class="text-secondary small mb-3">${game.description}</p>` : ""}

          <div class="row g-2 mb-3">
            <div class="col-6 col-md-3">
              <div class="p-2 bg-body-tertiary rounded">
                <div class="text-secondary" style="font-size:11px">Date</div>
                <div class="small fw-semibold">${formatDate(game.plannedAt)}</div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="p-2 bg-body-tertiary rounded">
                <div class="text-secondary" style="font-size:11px">Time</div>
                <div class="small fw-semibold">${formatTime(game.plannedAt)}</div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="p-2 bg-body-tertiary rounded">
                <div class="text-secondary" style="font-size:11px">Location</div>
                <div class="small fw-semibold">${game.location}</div>
              </div>
            </div>
            <div class="col-6 col-md-3">
              <div class="p-2 bg-body-tertiary rounded">
                <div class="text-secondary" style="font-size:11px">Players</div>
                <div class="small fw-semibold">${game.participants.length} / ${game.maxParticipants}</div>
              </div>
            </div>
          </div>

          ${avgElo ? `<p class="small text-secondary mb-2">Avg. ELO: ${avgElo}</p>` : ""}

          ${
              game.winnerName
                  ? `
            <div class="alert alert-warning py-2 small mb-3">
              Winner: <strong>${game.winnerName}</strong>
            </div>`
                  : ""
          }

          ${actionBtn ? `<div>${actionBtn}</div>` : ""}
        </div>
      </div>

      <div class="card">
        <div class="card-header small fw-semibold">
          Participants (${game.participants.length})
        </div>
        <div class="list-group list-group-flush">
          ${
              sorted.length
                  ? sorted
                        .map((p) => {
                            const isMe = user && p.userId === user.id;
                            const isWinner = p.userId === game.winnerUserId;
                            return `
                  <a href="profile.html?id=${p.userId}" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-2">
                    <div class="avatar">${initials(p.name)}</div>
                    <div class="flex-grow-1">
                      ${p.name}
                      ${isMe ? '<span class="text-secondary small ms-1">(you)</span>' : ""}
                      ${isWinner ? '<span class="badge bg-warning text-dark ms-1 small">Winner</span>' : ""}
                    </div>
                    <span class="small text-secondary">${p.elo} ELO</span>
                  </a>`;
                        })
                        .join("")
                  : `<div class="list-group-item text-secondary small">No players signed up yet.</div>`
          }
        </div>
      </div>`,
                );
            }

            function handleJoin() {
                joinGame(id, user);
                render();
            }
            function handleLeave() {
                leaveGame(id, user.id);
                render();
            }

            render();
        </script>
    </body>
</html>
