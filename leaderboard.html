<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard · King of the Court</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container py-4">
  <div class="mb-4">
    <h1 class="h3 fw-bold">Leaderboard</h1>
    <p class="text-secondary mb-0">Rankings update after each game.</p>
  </div>

  <div class="row g-4">
    <div class="col-md-7">
      <div class="card">
        <div class="list-group list-group-flush" id="rankings"></div>
      </div>
    </div>
    <div class="col-md-5">
      <div class="card">
        <div class="card-body">
          <h6 class="fw-semibold mb-1">Find a player</h6>
          <p class="text-secondary small mb-3">Search by name.</p>
          <div id="search-area"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<nav class="navbar fixed-bottom bg-body-tertiary border-top" id="bottom-nav"></nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  initNav('leaderboard');
  const user   = getUser();
  const ranked = [...USERS].sort((a, b) => b.elo - a.elo);

  document.getElementById('rankings').innerHTML = ranked.map((p, i) => {
    const isMe  = user && p.id === user.id;
    const dest  = user ? `profile.html?id=${p.id}` : `login.html?next=leaderboard.html`;
    const rankStyle = i === 0 ? 'fw-bold text-warning' : 'text-secondary';
    return `
      <a href="${dest}" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-2">
        <span class="${rankStyle}" style="width:20px;text-align:right;font-size:13px">${i + 1}</span>
        <div class="avatar">${initials(p.name)}</div>
        <div class="flex-grow-1 min-w-0">
          <span class="fw-medium">${p.name}</span>
          ${isMe ? '<span class="text-secondary small ms-1">(you)</span>' : ''}
        </div>
        <span class="small text-secondary text-nowrap">${p.elo} ELO</span>
      </a>`;
  }).join('');

  if (user) {
    show('search-area', `
      <input type="text" class="form-control form-control-sm mb-2" id="search-input" placeholder="Name...">
      <div id="search-results"></div>`);
    document.getElementById('search-input').addEventListener('input', () => {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      if (!q) { show('search-results', ''); return; }
      const hits = USERS.filter(u => u.name.toLowerCase().includes(q));
      show('search-results', hits.length
        ? `<div class="list-group">${hits.map(p => `
            <a href="profile.html?id=${p.id}" class="list-group-item list-group-item-action d-flex align-items-center gap-2 py-2 small">
              <div class="avatar">${initials(p.name)}</div>
              <span class="flex-grow-1">${p.name}</span>
              <span class="text-secondary">${p.elo} ELO</span>
            </a>`).join('')}</div>`
        : `<p class="small text-secondary mb-0">No players found.</p>`);
    });
  } else {
    show('search-area', `
      <p class="small text-secondary mb-2">Sign in to search players and view profiles.</p>
      <a href="login.html?next=leaderboard.html" class="btn btn-primary btn-sm">Log in</a>`);
  }
</script>
</body>
</html>
