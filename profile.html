<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile · King of the Court</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container py-4">
  <a href="javascript:history.back()" class="text-secondary small d-inline-block mb-3">
    <i class="bi bi-arrow-left"></i> Back
  </a>
  <div id="content"></div>
</div>

<nav class="navbar fixed-bottom bg-body-tertiary border-top" id="bottom-nav"></nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  initNav('leaderboard');
  if (!requireAuth()) throw new Error('redirect');

  const viewer   = getUser();
  const targetId = parseInt(qp('id'));

  let profile = getMergedUser(targetId);
  if (!profile) {
    const edits = getUserEdits();
    profile = edits[targetId] || null;
  }

  if (!profile) {
    show('content', `
      <div class="text-center text-secondary py-5">
        <i class="bi bi-person-x" style="font-size:2rem"></i>
        <p class="mt-2">Player not found.</p>
        <a href="leaderboard.html" class="btn btn-outline-secondary btn-sm">Back to Leaderboard</a>
      </div>`);
  } else {
    document.title = `${profile.name} · King of the Court`;

    const playerGames = getGames()
      .filter(g => g.status !== 'planned' && g.participants.some(p => p.userId === profile.id))
      .sort((a, b) => new Date(b.plannedAt) - new Date(a.plannedAt));

    const wins  = playerGames.filter(g => g.winnerUserId === profile.id).length;
    const rank  = [...USERS].sort((a, b) => b.elo - a.elo).findIndex(u => u.id === profile.id) + 1;
    const isMe  = viewer && viewer.id === profile.id;

    const chartEl = document.createElement('div');
    renderEloChart(chartEl, profile.eloHistory, 'ELO History');

    show('content', `
      <div class="card mb-3">
        <div class="card-body">
          <div class="d-flex align-items-center gap-3 mb-4 pb-3 border-bottom">
            <div class="avatar-lg">${initials(profile.name)}</div>
            <div>
              <h4 class="mb-0 fw-bold">
                ${profile.name}
                ${isMe ? '<span class="text-secondary small fw-normal ms-1">(you)</span>' : ''}
              </h4>
              <div class="text-secondary small mt-1">Member since ${formatMonthYear(profile.createdAt)}</div>
              ${rank > 0 ? `<div class="small mt-1">Rank <strong>#${rank}</strong></div>` : ''}
            </div>
          </div>

          <div class="row g-2 text-center mb-3">
            <div class="col-4">
              <div class="p-2 bg-body-tertiary rounded">
                <div class="fw-bold fs-5">${profile.elo ?? 1500}</div>
                <div class="text-secondary" style="font-size:11px">ELO</div>
              </div>
            </div>
            <div class="col-4">
              <div class="p-2 bg-body-tertiary rounded">
                <div class="fw-bold fs-5">${playerGames.length}</div>
                <div class="text-secondary" style="font-size:11px">Played</div>
              </div>
            </div>
            <div class="col-4">
              <div class="p-2 bg-body-tertiary rounded">
                <div class="fw-bold fs-5">${wins}</div>
                <div class="text-secondary" style="font-size:11px">Wins</div>
              </div>
            </div>
          </div>

          <div id="chart-slot"></div>

          ${isMe ? `<a href="account.html" class="btn btn-outline-secondary btn-sm">Edit Profile</a>` : ''}
        </div>
      </div>

      <div class="card">
        <div class="card-header small fw-semibold">Recent Games (${playerGames.length})</div>
        <div class="list-group list-group-flush">
          ${playerGames.length
            ? playerGames.map(g => {
                const won = g.winnerUserId === profile.id;
                return `
                  <a href="game.html?id=${g.id}" class="list-group-item list-group-item-action d-flex align-items-center gap-3 py-2">
                    <div class="flex-grow-1 min-w-0">
                      <div class="small fw-medium">
                        ${g.name}
                        ${won ? '<span class="badge bg-warning text-dark ms-1">Winner</span>' : ''}
                      </div>
                      <div class="text-secondary" style="font-size:11px">${formatDate(g.plannedAt)} &middot; ${g.location}</div>
                    </div>
                    ${statusBadge(g.status)}
                  </a>`;
              }).join('')
            : `<div class="list-group-item text-secondary small">No completed games yet.</div>`}
        </div>
      </div>`);

    document.getElementById('chart-slot').replaceWith(chartEl);
  }
</script>
</body>
</html>
