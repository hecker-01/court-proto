<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account · King of the Court</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container py-4" style="max-width:560px">
  <div class="mb-4">
    <h1 class="h3 fw-bold">Account</h1>
    <p class="text-secondary mb-0">Manage your profile.</p>
  </div>
  <div id="content"></div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Delete account?</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-secondary small">
        This will permanently remove your account and cannot be undone.
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger btn-sm" onclick="confirmDelete()">Delete</button>
      </div>
    </div>
  </div>
</div>

<nav class="navbar fixed-bottom bg-body-tertiary border-top" id="bottom-nav"></nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  initNav('account');
  if (!requireAuth()) throw new Error('redirect');

  let user    = getUser();
  let editing = false;

  function render() {
    if (editing) {
      show('content', `
        <div class="card">
          <div class="card-body">
            <h6 class="fw-semibold mb-3">Edit Profile</h6>
            <div id="edit-error"></div>
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input class="form-control" id="e-name" value="${escHtml(user.name)}">
            </div>
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input class="form-control" type="email" id="e-email" value="${escHtml(user.email)}">
            </div>
            <div class="mb-3">
              <label class="form-label">Phone</label>
              <input class="form-control" type="tel" id="e-phone" value="${escHtml(user.phone || '')}">
            </div>
            <div class="d-flex gap-2 pt-2 border-top">
              <button class="btn btn-primary btn-sm" onclick="saveEdit()">Save</button>
              <button class="btn btn-outline-secondary btn-sm" onclick="editing=false;render()">Cancel</button>
            </div>
          </div>
        </div>`);
      return;
    }

    show('content', `
      <div class="card mb-3">
        <div class="card-body">
          <div class="d-flex align-items-center gap-3 mb-4 pb-3 border-bottom">
            <div class="avatar-lg">${initials(user.name)}</div>
            <div>
              <h5 class="mb-0 fw-bold">${escHtml(user.name)}</h5>
              <div class="text-secondary small mt-1">${user.role === 'admin' ? 'Admin' : 'Player'}</div>
              <div class="fw-bold mt-1">${user.elo ?? 1500} <span class="text-secondary fw-normal small">ELO</span></div>
            </div>
          </div>
          <dl class="row mb-0 small">
            <dt class="col-4 fw-normal text-secondary">Email</dt>
            <dd class="col-8">${escHtml(user.email)}</dd>
            <dt class="col-4 fw-normal text-secondary">Phone</dt>
            <dd class="col-8">${user.phone ? escHtml(user.phone) : '<span class="text-secondary">Not set</span>'}</dd>
            <dt class="col-4 fw-normal text-secondary">Member since</dt>
            <dd class="col-8 mb-0">${formatMonthYear(user.createdAt)}</dd>
          </dl>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 mb-3">
        <button class="btn btn-outline-secondary btn-sm" onclick="editing=true;render()">
          <i class="bi bi-pencil"></i> Edit Profile
        </button>
        <button class="btn btn-outline-secondary btn-sm" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i> Sign Out
        </button>
      </div>

      ${user.role !== 'admin'
        ? `<button class="btn btn-link btn-sm text-secondary text-decoration-none p-0"
               data-bs-toggle="modal" data-bs-target="#deleteModal">
             Delete account
           </button>`
        : `<span class="text-secondary small">Admins cannot delete their own account.</span>`}`);
  }

  function saveEdit() {
    const name  = document.getElementById('e-name').value.trim();
    const email = document.getElementById('e-email').value.trim().toLowerCase();
    const phone = document.getElementById('e-phone').value.trim();
    if (!name || !email) {
      show('edit-error', '<div class="alert alert-danger py-2 small">Name and email are required.</div>');
      return;
    }
    user = { ...user, name, email, phone };
    setUser(user);
    const edits = getUserEdits();
    edits[user.id] = { name, email, phone };
    localStorage.setItem('user_edits', JSON.stringify(edits));
    editing = false;
    render();
  }

  function confirmDelete() {
    bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
    localStorage.removeItem('auth_user');
    location.href = 'index.html';
  }

  render();
</script>
</body>
</html>
