<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account · King of the Court</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page">
  <div class="page-header">
    <h1 class="page-title">Account</h1>
    <p class="page-sub">Manage your profile.</p>
  </div>
  <div id="content"></div>
</div>

<!-- Delete confirm modal -->
<div class="modal-overlay hidden" id="delete-modal">
  <div class="modal-box">
    <div class="modal-title">Delete account?</div>
    <div class="modal-body">This will permanently remove your account. This action cannot be undone.</div>
    <div class="flex gap-3">
      <button class="btn btn-danger" onclick="confirmDelete()">Delete</button>
      <button class="btn btn-ghost" onclick="document.getElementById('delete-modal').classList.add('hidden')">Cancel</button>
    </div>
  </div>
</div>

<nav class="bottom-nav" id="bottom-nav"></nav>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  initNav('account');
  if (!requireAuth()) throw new Error('redirect');

  let user = getUser();
  let editing = false;

  function render() {
    if (editing) {
      show('content', `
        <div class="card">
          <h2 style="font-size:16px;font-weight:600;margin-bottom:16px">Edit Profile</h2>
          <div id="edit-error"></div>
          <div class="form-group">
            <label class="form-label">Name</label>
            <input class="form-input" id="e-name" value="${escHtml(user.name)}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Email</label>
            <input class="form-input" type="email" id="e-email" value="${escHtml(user.email)}" required>
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="form-input" type="tel" id="e-phone" value="${escHtml(user.phone || '')}">
          </div>
          <div class="flex gap-3" style="padding-top:8px;border-top:1px solid var(--asphalt-light)">
            <button class="btn btn-primary" onclick="saveEdit()">Save</button>
            <button class="btn btn-ghost" onclick="editing=false;render()">Cancel</button>
          </div>
        </div>`);
      return;
    }

    show('content', `
      <div class="card" style="margin-bottom:16px">
        <div class="flex items-center gap-4 mb-6" style="padding-bottom:20px;border-bottom:1px solid var(--asphalt-light)">
          <div class="avatar-lg">${initials(user.name)}</div>
          <div>
            <div style="font-size:20px;font-weight:700">${escHtml(user.name)}</div>
            <div class="text-dim text-sm mt-1">${user.role === 'admin' ? '⚙️ Admin' : '🎾 Player'}</div>
            <div style="font-size:22px;font-weight:700;color:var(--ball);margin-top:4px">${user.elo ?? 1500} <span class="text-muted text-sm" style="font-weight:400">ELO</span></div>
          </div>
        </div>

        <div style="display:grid;gap:16px">
          <div>
            <div class="form-label">Email</div>
            <div>${escHtml(user.email)}</div>
          </div>
          <div>
            <div class="form-label">Phone</div>
            <div>${user.phone ? escHtml(user.phone) : '<span class="text-muted">Not set</span>'}</div>
          </div>
          <div>
            <div class="form-label">Member Since</div>
            <div>${formatMonthYear(user.createdAt)}</div>
          </div>
        </div>
      </div>

      <div class="flex gap-3 wrap" style="margin-bottom:8px">
        <button class="btn btn-ghost" onclick="editing=true;render()">✏️ Edit Profile</button>
        <button class="btn btn-ghost" style="color:var(--danger)" onclick="logout()">Sign Out</button>
      </div>
      ${user.role !== 'admin'
        ? `<button class="btn-link" onclick="document.getElementById('delete-modal').classList.remove('hidden')">Delete account</button>`
        : `<span class="text-xs text-muted">Admins cannot delete their own account.</span>`}
    `);
  }

  function saveEdit() {
    const name  = document.getElementById('e-name').value.trim();
    const email = document.getElementById('e-email').value.trim().toLowerCase();
    const phone = document.getElementById('e-phone').value.trim();
    if (!name || !email) {
      show('edit-error', '<div class="alert alert-error">Name and email are required.</div>');
      return;
    }
    user = { ...user, name, email, phone };
    setUser(user);
    // Persist edits so getMergedUser can pick them up
    const edits = getUserEdits();
    edits[user.id] = { name, email, phone };
    localStorage.setItem('user_edits', JSON.stringify(edits));
    editing = false;
    render();
  }

  function confirmDelete() {
    localStorage.removeItem('auth_user');
    location.href = 'index.html';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  render();
</script>
</body>
</html>
