<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>History · King of the Court</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="container py-4">
  <div class="mb-4">
    <h1 class="h3 fw-bold">Game History</h1>
    <p class="text-secondary mb-0">Your past games and performance.</p>
  </div>
  <div id="elo-chart"></div>
  <div id="filter-tabs"></div>
  <div id="games-list"></div>
</div>

<nav class="navbar fixed-bottom bg-body-tertiary border-top" id="bottom-nav"></nav>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  initNav('history');
  if (!requireAuth()) throw new Error('redirect');

  const user = getUser();
  let activeFilter = 'all';

  const userGames = getGames()
    .filter(g => g.status !== 'planned' && g.participants.some(p => p.userId === user.id))
    .sort((a, b) => {
      const order = { started: 0, ended: 1, processed: 2 };
      const d = (order[a.status] ?? 3) - (order[b.status] ?? 3);
      return d !== 0 ? d : new Date(b.plannedAt) - new Date(a.plannedAt);
    });

  const counts = { all: userGames.length, started: 0, ended: 0 };
  userGames.forEach(g => g.status === 'started' ? counts.started++ : counts.ended++);

  const u = getMergedUser(user.id) || user;
  renderEloChart(document.getElementById('elo-chart'), u.eloHistory || user.eloHistory, 'ELO History');

  function renderList() {
    const filtered = activeFilter === 'all' ? userGames
      : activeFilter === 'ended'   ? userGames.filter(g => g.status === 'ended' || g.status === 'processed')
      : userGames.filter(g => g.status === activeFilter);

    if (userGames.length) {
      show('filter-tabs', `
        <div class="d-flex gap-2 mb-3">
          ${['all', 'started', 'ended'].map(k => `
            <button class="btn btn-sm ${activeFilter === k ? 'btn-primary' : 'btn-outline-secondary'}" onclick="setFilter('${k}')">
              ${k.charAt(0).toUpperCase() + k.slice(1)} (${counts[k] ?? 0})
            </button>`).join('')}
        </div>`);
    }

    if (!userGames.length) {
      show('games-list', `
        <div class="text-center text-secondary py-5">
          <i class="bi bi-calendar2" style="font-size:2rem"></i>
          <p class="mt-2 mb-3">No games played yet.</p>
          <a href="index.html" class="btn btn-outline-secondary btn-sm">Browse Games</a>
        </div>`);
      return;
    }

    if (!filtered.length) {
      show('games-list', `<p class="text-secondary small text-center py-4">No ${activeFilter} games.</p>`);
      return;
    }

    show('games-list', filtered.map(g => {
      const won = g.winnerUserId === user.id;
      return `
        <div class="card mb-2 clickable" onclick="location.href='game.html?id=${g.id}'">
          <div class="card-body py-2 d-flex align-items-center gap-3">
            <div class="flex-grow-1 min-w-0">
              <div class="fw-medium">
                ${g.name}
                ${won ? '<span class="badge bg-warning text-dark ms-1">Winner</span>' : ''}
              </div>
              <div class="small text-secondary">${formatDate(g.plannedAt)} &middot; ${g.location}</div>
            </div>
            <div class="text-end flex-shrink-0">
              ${statusBadge(g.status)}
              ${g.winnerName && !won ? `<div class="text-secondary mt-1" style="font-size:11px">${g.winnerName}</div>` : ''}
            </div>
          </div>
        </div>`;
    }).join(''));
  }

  function setFilter(f) { activeFilter = f; renderList(); }

  renderList();
</script>
</body>
</html>
